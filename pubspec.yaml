name: fcsit_advisorbot
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_markdown: ^0.7.7+1
  http: ^1.6.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7

flutter_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/app_splash.png
  ios_content_mode: center
  android_12:
    color: "#FFFFFF"
    image: assets/app_splash_mobile.png

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/app_splash.png
    - assets/app_splash_mobile.png
